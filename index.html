<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Java_Prac.css">
    <title>Document</title>
</head>
<body>
    <div class="big">
        <h1>Calculator</h1>
        <div class="cal">
            <div class="display">
                <div class="exp"></div>
                <!-- <hr/> -->
                <div class="ans">Ans.</div>
            </div>
            <div class="symbol">
               <button id="AC" class="rem_func">AC</button>
               <button id="DEL" class="rem_func">DEL</button> 
               <button class="btn_symb">*</button>
               <button class="btn_symb">/</button>
               <button class="btn">1</button>
               <button class="btn">2</button>
               <button class="btn">3</button>
               <button class="btn_symb">+</button>
               <button class="btn">4</button>
               <button class="btn">5</button>
               <button class="btn">6</button>
               <button class="btn_symb">-</button>
               <button class="btn">7</button>
               <button class="btn">8</button>
               <button class="btn">9</button>
               <button class="btn_symb">(</button>
               <button class="btn">0</button>
               <button class="btn">00</button>
               <button class="btn_symb">.</button>
               <button class="btn_symb">)</button>
               <button id="res" class="func">=</button>
            </div>
        </div>
    </div>

<script src="Java_Prac.js" ></script>
</body>
</html>
